# Author Registry
#
# Add yourself here to be set up as a blog author.
# Run: uv run scripts/wordpress/sync_authors.py
#
# Fields:
#   name        - Display name shown on posts (required)
#   slug        - URL-safe identifier, used in post frontmatter as `author` (required)
#   email       - Used for Gravatar fallback (required)
#   bio         - Short author biography (optional)
#   avatar_url  - URL to author photo. Overrides Gravatar via the
#                 Simple Local Avatars plugin. Any https image URL works
#                 (WordPress media library, Gravatar, personal site, etc.) (optional)

