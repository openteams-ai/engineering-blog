name: Blog post idea
description: Propose a new blog post for the engineering blog
title: "Blog post: <title>"
labels: ["blog post"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: In a few sentences, tell us what you'd like to write about. Even a half-formed idea works.
      placeholder: I've been working with X lately and learned some non-obvious things about Y. Could turn into a short post.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Optional. Link to related posts, tools, or external resources.
      placeholder: |
        - Inspired by https://example.com/article
        - Tool we'd cover: https://github.com/owner/repo

  - type: input
    id: author
    attributes:
      label: Author
      description: Your GitHub handle if you plan to write this, or @-mention someone who could. Leave blank if neither applies.
